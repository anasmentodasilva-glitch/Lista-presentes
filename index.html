<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Presentes · Caroline & Tiago</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <p class="header-label">Lista de Presentes</p>
      <h1 class="header-names">Caroline <span class="amp">&amp;</span> Tiago</h1>
      <p class="header-date">04 de julho de 2026</p>
      <div class="header-divider"></div>
      <p class="header-message">
        Sua presença já é o maior presente.<br>
        Mas se desejar nos presentear, escolha um item abaixo.
      </p>
    </div>
  </header>

  <!-- FILTER TABS -->
  <nav class="filter-nav" id="filterNav">
    <button class="filter-btn active" data-category="all">Todos</button>
    <button class="filter-btn" data-category="cozinha">🍽 Cozinha</button>
    <button class="filter-btn" data-category="quarto">🛏 Quarto</button>
    <button class="filter-btn" data-category="banheiro">🚿 Banheiro</button>
  </nav>

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar">
    <div class="status-loading" id="statusLoading">
      <div class="spinner"></div>
      <span>Carregando lista…</span>
    </div>
    <div class="status-counts" id="statusCounts" style="display:none">
      <span id="countAvailable">—</span> disponíveis &nbsp;·&nbsp; <span id="countReserved">—</span> reservados
    </div>
  </div>

  <!-- GIFT GRID -->
  <main class="gift-grid" id="giftGrid">
    <!-- items injected by JS -->
  </main>

  <!-- MODAL: reserve -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fechar">&#x2715;</button>
      <p class="modal-label">Você escolheu</p>
      <h2 class="modal-title" id="modalItemName"></h2>
      <div class="modal-form">
        <label for="guestName" class="form-label">Seu nome completo</label>
        <input type="text" id="guestName" class="form-input" placeholder="Como devemos te chamar?" autocomplete="name" />
        <p class="form-error" id="formError"></p>
        <button class="btn-confirm" id="btnConfirm">Confirmar reserva</button>
      </div>
    </div>
  </div>

  <!-- MODAL: success -->
  <div class="modal-overlay" id="successOverlay" aria-hidden="true">
    <div class="modal modal-success" role="dialog" aria-modal="true">
      <div class="success-icon">✓</div>
      <h2 class="modal-title">Reserva confirmada!</h2>
      <p class="success-msg" id="successMsg"></p>
      <button class="btn-confirm" id="btnSuccessClose">Fechar</button>
    </div>
  </div>

  <footer class="site-footer">
    <p>Com amor ♡ Caroline &amp; Tiago</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
